 KAB_GATHERING_STORM_DESC:0 "18世紀のシベリア大植民以来、西方シベリアはロシア人による入植、流刑が積極的に行われてきた。1822年の行政改革により、オムスク軍管区こと西シベリア総督府が設置されたが、1865年に他の総督府と統合され"シベリア軍管区"として再編された。その後、20世紀に入り、フランス人地質学者ピエール・ダミアンによってオムスク州近郊に大規模な鉄鋼資源が発見されると、オムスク市を再びオムスク軍管区として他の行政管区とは独立した自治州として統治すべきという決定がペトログラード中央政府によってされた。この方針ははのちのソヴィエト政府にも引き継がれ、ロバート・エイへを首班とするシベリア・ソヴィエト自治共和国として成立した。だが、あのスターリンが権力を掌握した今、我々の政府の地位は再び危ういものとなっている。彼は自分の意見に従わないものにトロツキストのレッテルを貼り、存在を抹消しようとしている。我々はそのような危険を冒してでもこの地位に安住すべきだろうか？"
