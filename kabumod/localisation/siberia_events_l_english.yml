l_english:
 knews.10001.d:0 "「シベリア地域防衛評議会」の結成が本日首都カブスクにて宣言された。\n彼らの理念はシベリアから世界へ「革命の輸出」を行うことだと宣言され、元首の[KAB.GetLeader]の演説が終わると観衆の拍手と熱狂に演説会場が包まれた。\n\nこの行動に対し英仏はだんまりを決め込んでいるが、ソヴィエト社会主義共和国連邦の[SOV.GetLeader]は「薄汚い裏切者」と激しく非難し、また大陸における覇権を拡大しようとしている大日本帝国からも激しい非難を浴びた。\n\n極北の大地で何が起こるかは未だ誰も分からない…"
 nwews.10002.t:0 "[SOV.getname]がシベリアから撤退"
 knews.10002.d:0 "ソビエト連邦にとって手痛い打撃だ。\n新興勢力のシベリア地域防衛評議会との交渉によりウラル以東のシベリアをすべて失うことになったのである。\nこの広大な荒野には新たな政治が敷かれることになるだろう。\nソ連のスポークスマンは今のところ声明を拒否している。\nなお、極東ではどさくさに紛れて日本が出兵を敢行したようだ。"
 kabu.1.d:0 "本日、シベリア＝ソビエト自治共和国の首都オムスク特別市において自治共和国の将来の方向性を決定する会議が開催された。\nロシア内戦後に西シベリア地域の資源開拓の前哨基地として設置されたシベリア自治区は、このままソビエト連邦のもとで存続するか、自分たちで新たな道を切り開くかの岐路に立たされていた…"
 kabu.2.d:0 "昨日の人民会議において現状維持でコミンテルンの傘の下にて守られるかそれとも新たな道を進むかについて議会が二分された。\n大半の議員は新たな道を開拓する選択を支持したが、一部のソビエト派議員はそれに猛反対した。\nそれによって、人民議会ではこの自治共和国の全有権者に選択する権利が有るという決定がなされ、国民投票を行う決定をした。"
 kabu.3.d:0 "1936年3月。シベリア初の人民議会議員による議長選挙が行われた。\n人民議会長はこれまで、ソヴィエトの派遣政治顧問のみによって選定されていたが、シベリアがソヴィエト連邦より独立したことに伴い今回初めて議員による選挙が実現した。\nこの政治行動に対し、元宗主国であるソヴィエト連邦もといその指導者である[SOV.GetLeader]書記長は激しい非難声明を出した。また、英米などの民主主義国はこの行動に対し概ね好意的な対応をとったが、中にはこれが元帝国主義国による植民地支配の崩壊の始まりだとして警戒行動を取るよう呼びかける者もいた。\n\nおよそ30分にわたる厳正な投票作業の後、今後のシベリアの未来を左右する人物が決定した…"
 kabu.6.d:0 "...はずだった。人民議会議員による議長選挙は規定数の2/3を超えず、再投票が続いた。これを好機と見た無政府主義者が四度目の投票作業中の人民議会を襲撃し、人民議会議長候補六人を含む全議員を逮捕または殺害し、人民議会の崩壊、及びそれに伴う反権威主義的無政府主義を中核に置くシベリアでの新秩序の形成を宣言した。\nソヴィエト連邦を筆頭とする諸外国はこの動きに警戒を示しているが、例外としてイギリスのみは「所詮彼らはああして革命家を気取っているに過ぎない。」とした。"
 kabu.8.t:0 "Who is she?"
 kabu.8.d:0 "霊夢：どうも皆さん、お久しぶりです。霊夢でした\n魔理沙：何で過去形なの？ちょっと待て、じゃあ今は何者なんだよ\n霊夢：よくわかんないです。記憶がおぼろげでして\n魔理沙：じゃあ試してみよう\n魔理沙：これは？（フランの立ち絵が出てくる）\n霊夢：えーと、吸血鬼のやばい奴だったかな\n魔理沙：これは？（チルノの立ち絵が出てくる）\n霊夢：⑨だった気がする\n魔理沙：じゃあこれは？（魔理沙の立ち絵が出てくる）\n霊夢：暴力のアルターエゴ\n魔理沙：はったおすぞテメェ\n霊夢：てなわけでウィザー先生を狩ります\n魔理沙：どういうわけだよ\n霊夢：だからそういうことですよ\n魔理沙：分かんねぇよ\n霊夢：ちょっと四騎士クラスに有利とれるからって調子に乗るのもたいがいにしてくださいよ\n魔理沙：それとこれとは関係ないだr だからアルターエゴじゃねーよ"
 kabu.9.d:0 "いつもの5人を雇用し[KAB.GetLeader]の短所を補います"
 kabu..d:0 "周知のように我が国の指導者である同志かぶは"うｐ主"である。我々評議会員には彼(彼女？)を再教育し、より良い指導者とするする義務があるだろう。"
 kabu..d:0 "我が評議会共和国には軍隊を率いて将来的には五大大陸で活躍するであろう将軍が圧倒的に不足している。\nそこで、共和国のどこからか将軍となる人材を調達する必要がある。\n具体的には人民軍より有望かつ忠実な兵士を募集するか、政治顧問の中で軍務の経験がある者を配置するかというものだ。\n\n人民兵の人物は現場の声をよく理解しているだろうし、政治顧問はコミッサール(政治将校)として活用できるだろう。\n我々は軍隊をどのように改造すべきだろうか？？"
 kabu..t:0 "Lets build kimashitower here"
 kabu..d:0 "霊夢：スポーンエッグは三つしかないので失敗したら大変ですからね\n魔理沙：別に牛がそこまで大事とは思えんがな\n霊夢：だってこいつらがいないと私ひとりぼっちでさみしいんですもん\n魔理沙：私がいるだろ\n魔理沙：心外そうな顔するなよぶっ飛ばすぞ\n霊夢：あなたほんとに魔理沙ですか\n魔理沙：喧嘩売ってんのか刺すぞ\nか）レイマリ展開ってマジ！全私歓喜じゃん\n魔理沙：お前は日本語を喋るな\nか）Let's build kimashitower here"
 nf.13.d:0 "赤霊：はぁもう許さんお前の住所控えたからな\n魔：ホワイトハウスの住所とか控えるまでもないと思うんですけど\n赤霊：毎日同志スターリンの肖像画送り付けよ\n魔：陰湿すぎるだろ\n赤霊：着払いで\n魔：迷惑すぎるだろ\n赤霊：資本主義から資本を削る作戦ですよ"
 kabu..:0 "青霊夢：というわけで一方的な核戦争の始まりです\n魔理沙：戦争っていうかこれただの無差別なテロでは\n青霊夢：失礼ですね\n青霊夢：ちゃんと都市狙ってますよ"
 kabu..d:0 "赤霊夢：どうも皆さん\n赤青白黒霊夢：「「「「ホイの時間ですよ」」」」\n魔理沙：…なんか多くね？\n\n魔理沙：それで？何のマネなんだそれは\n赤霊夢：え～と今回はですね\n青霊夢：我々で交代でプレイする企画となっております\n魔理沙：どれも霊夢じゃん\n魔理沙：交代しても変わらないだろ\n黒霊夢：いや、もうタイトルで大体わかるでしょ...\n魔理沙：イデオロギーシャトルラン..おい、まさかこれって\n白霊夢：はい"
 kabu..d:0 "霊夢：プログレッシブオートメーションズのプランターを用いて自動畑を作りました\n魔理沙：あれ？見た目は変わってないようだがほんとに自動化してるのか？\n霊夢：失敬な、この畑は下でこちらの\n霊夢：エレクトリック同志が働いているんですよ\n魔理沙：うーんこのネーミングセンスの無さ\n魔理沙：というか左側に不穏なものが映っているんですがそれｈ\n(ﾃﾞｪェ)魔理沙：おいやめろいきなり大きい音を出すんじゃねぇ\n霊夢：いやあ失敬失敬、つい手が滑りました。で、こちらのプランターは見てわかる通りダイy\n(ｪｪｪﾝ)"
 
 nf.57.d:0 "霊：ねぇねぇ魔理沙みてくださいよこれ\n魔：また雑な導入な気がするけどなんだ\n霊：倉庫を漁ってたらずいぶん前に奪った打ち出の小槌があったんですよ\n魔：針妙丸に返してやれよ...\n霊：私は気づいてしまったのです\n霊：これを魔理沙に当てれば暴力的なツッコミから解放されるのではと\n魔：お前がふざけなければいい話では？\n霊：問答無用、散滅すべし！\n魔：おいおい、そんなの避ければ済むもんだろうが\n（轟音）\n霊：おいおい、これ大丈夫かよ\n霊：まあこっちには誰もいなかったはずですし "